name: Build minified assets

on:
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.js"
      - "**/*.css"
      - "package.json"
      - "package-lock.json"
      - "scripts/minify-assets.js"
      - "!**/*.min.js"
      - "!**/*.min.css"
  pull_request:
    paths:
      - "**/*.js"
      - "**/*.css"
      - "package.json"
      - "package-lock.json"
      - "scripts/minify-assets.js"
      - "!**/*.min.js"
      - "!**/*.min.css"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minify-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install build dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund --no-package-lock
          fi

      - name: Generate minified assets
        run: npm run minify

      - name: Verify generated assets on pull requests
        if: github.event_name == 'pull_request'
        run: git diff --exit-code

      - name: Commit generated minified assets
        if: github.event_name == 'push'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Build minified assets [skip ci]"
            git push
          else
            echo "Minified assets are already up to date."
          fi
