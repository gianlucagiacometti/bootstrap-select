name: Remove node_modules

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove-node-modules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Remove node_modules and add gitignore
        run: |
          rm -rf node_modules

          if [ ! -f .gitignore ]; then
            touch .gitignore
          fi

          grep -qxF "node_modules/" .gitignore || echo "node_modules/" >> .gitignore
          grep -qxF "npm-debug.log*" .gitignore || echo "npm-debug.log*" >> .gitignore
          grep -qxF ".DS_Store" .gitignore || echo ".DS_Store" >> .gitignore

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to clean."
          else
            git commit -m "Remove node_modules and update gitignore [skip ci]"
            git push
          fi
