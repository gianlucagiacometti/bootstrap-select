name: Compile LESS

on:
  push:
    paths:
      - "*.less"
      - "**/*.less"
      - ".github/workflows/compile-less.yml"

permissions:
  contents: write

jobs:
  compile-less:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install LESS
        run: npm install -g less

      - name: Install build dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund --no-package-lock
          fi

      - name: Compile LESS
        run: lessc bootstrap-select.less bootstrap-select.css

      - name: Build minified assets
        run: npm run minify

      - name: Commit compiled and minified assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Compile LESS and build minified assets [skip ci]
          file_pattern: bootstrap-select.css bootstrap-select.min.css bootstrap-select.min.js
